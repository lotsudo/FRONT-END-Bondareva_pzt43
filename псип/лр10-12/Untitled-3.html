<!DOCTYPE html>
<html>
<body>

<script>
    let arr = [12, 7, 45, 3, 18, 29, 10];

    document.write("Исходный массив: " + arr + "<br>");

    let max = Math.max(...arr);

    document.write("Максимальный элемент: " + max + "<br>");

    arr.pop();

    document.write("Измененный массив: " + arr);
</script>

</body>
</html>
